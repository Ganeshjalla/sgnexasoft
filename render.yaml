services:
  - type: web
    name: sgnexasoft-backend
    runtime: java
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -jar backend/target/sgnexasoft-backend-1.0.0.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_UPLOAD_DIR
        value: /tmp/uploads/
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
