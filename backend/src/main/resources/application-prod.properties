# ── Production application.properties ──
# Set these as environment variables on your server, never hardcode secrets

# Server
server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain

# Database (use env vars in production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sgnexasoft_db?useSSL=true&requireSSL=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sguser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Ganesh@03}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${SGNexasoftSuperSecretKeyThatIsAtLeast32CharactersLong2024!}
app.jwt.expiration=86400000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${APP_UPLOAD_DIR:/opt/sgnexasoft/uploads/}

# Logging
logging.level.com.sgnexasoft=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.file.name=/var/log/sgnexasoft/app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
