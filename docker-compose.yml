version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: sgnexasoft-db
    restart: always
    environment:
      MYSQL_DATABASE: sgnexasoft_db
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_USER: sguser
      MYSQL_PASSWORD: sgpass123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass123"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sgnexasoft-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/sgnexasoft_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: sguser
      SPRING_DATASOURCE_PASSWORD: sgpass123
      APP_JWT_SECRET: SGNexasoftProductionSecretKeyMustBe32CharsLong!
      APP_JWT_EXPIRATION: 86400000
      APP_UPLOAD_DIR: /app/uploads/
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ""
    container_name: sgnexasoft-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
